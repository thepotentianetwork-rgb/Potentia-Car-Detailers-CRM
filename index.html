// ---- Supabase REST/Auth helpers (plain fetch, no SDK needed) ----
async function sb(path, options = {}) {
  const res = await fetch(`${SUPABASE_URL}${path}`, {
    ...options,
    headers: {
      apikey: ANON_KEY,
      Authorization: `Bearer ${ANON_KEY}`, // default for logged-out requests; overridden below when a user is signed in
      "Content-Type": "application/json",
      ...(options.headers || {}),
    },
  });
  if (!res.ok) {
    let msg = `Request failed (${res.status})`;
    try {
      const err = await res.json();
      msg = err.msg || err.message || err.error_description || msg;
    } catch (_) {}
    throw new Error(msg);
  }
  if (res.status === 204) return null;
  return res.json();
}

// ---- Time helpers ----
// CONFIG hours use "9:00 AM" style; the database uses "14:00:00" style. Both get
// normalized to minutes-since-midnight so they can be compared directly.
function parse12h(t) {
  const [time, mer] = t.split(" ");
  let [h, m] = time.split(":").map(Number);
  if (mer === "PM" && h !== 12) h += 12;
  if (mer === "AM" && h === 12) h = 0;
  return h * 60 + m;
}
function pgTimeToMinutes(t) {
  const [h, m] = t.split(":").map(Number);
  return h * 60 + m;
}
function minutesToDisplay(mins) {
  let h = Math.floor(mins / 60);
  const m = mins % 60;
  const mer = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;
  return `${h}:${m.toString().padStart(2, "0")} ${mer}`;
}
function minutesToPgTime(mins) {
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}:00`;
}
function bookingBusyInterval(b, bufferMin) {
  const start = pgTimeToMinutes(b.start_time);
  const end = start + b.duration_min;
  if (b.type === "mobile") {
    const half = bufferMin / 2;
    return [start - half, end + half];
  }
  return [start, end];
}
function getAvailableStarts(dayBookings, durationMin, type, hours, granularity, bufferMin) {
  const dayStart = parse12h(hours.start);
  const dayEnd = parse12h(hours.end);
  const busy = dayBookings.map((b) => bookingBusyInterval(b, bufferMin)).sort((a, b) => a[0] - b[0]);
  const half = bufferMin / 2;
  const options = [];
  for (let t = dayStart; t + durationMin <= dayEnd; t += granularity) {
    const candidateStart = type === "mobile" ? t - half : t;
    const candidateEnd = type === "mobile" ? t + durationMin + half : t + durationMin;
    const overlaps = busy.some(([bStart, bEnd]) => candidateStart < bEnd && candidateEnd > bStart);
    if (!overlaps) options.push(t);
  }
  return options;
}
function getNextDays(n) {
  const days = [];
  const start = new Date();
  for (let i = 0; i < n; i++) {
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    days.push(d);
  }
  return days;
}
const iso = (d) => d.toISOString().split("T")[0];

function LiveBookingApp() {
  const [screen, setScreen] = useState("home");
  const [authMode, setAuthMode] = useState("login");
  const [session, setSession] = useState(null); // { access_token, user }
  const [profile, setProfile] = useState(null); // { id, role, full_name }
  const [confirmedBooking, setConfirmedBooking] = useState(null);
  const [globalError, setGlobalError] = useState("");

  const handleAuthed = async (session) => {
    setSession(session);
    try {
      const p = await fetchProfile(session.access_token, session.user.id);
      setProfile(p);
      setScreen(p?.role === "admin" ? "admin" : "customerBooking");
    } catch (e) {
      setGlobalError("Signed in, but couldn't load your profile: " + e.message);
    }
  };

  const signOut = () => {
    setSession(null);
    setProfile(null);
    setScreen("home");
  };

  return (
    <div style={{ fontFamily: "Inter, sans-serif" }} className="min-h-screen bg-[#0A0A0B] text-[#F5F5F6] flex flex-col">
      <style>{FONT_IMPORT}</style>

      {screen !== "admin" && (
        <Header
          loggedIn={!!session}
          onLogin={() => { setAuthMode("login"); setScreen("auth"); }}
          onDashboard={() => setScreen(profile?.role === "admin" ? "admin" : "customerBooking")}
          onSignOut={signOut}
        />
      )}

      {globalError && (
        <div className="mx-5 mt-3 flex items-start gap-2 bg-[#3D1515] border border-[#5C2323] rounded-lg px-3.5 py-2.5 text-[12px] text-[#E08A8A]">
          <AlertCircle size={14} className="shrink-0 mt-0.5" /> {globalError}
        </div>
      )}

      {screen === "home" && <Homepage onBook={() => setScreen(session ? "customerBooking" : "auth")} />}

      {screen === "auth" && (
        <AuthScreen
          mode={authMode}
          setMode={setAuthMode}
          onAuthed={handleAuthed}
          onBack={() => setScreen("home")}
          setGlobalError={setGlobalError}
        />
      )}

      {screen === "customerBooking" && session && profile && (
        <BookingFlow session={session} profile={profile} onConfirm={(b) => { setConfirmedBooking(b); setScreen("confirmed"); }} />
      )}

      {screen === "confirmed" && confirmedBooking && (
        <Confirmed booking={confirmedBooking} onDone={() => setScreen("home")} />
      )}

      {screen === "admin" && session && profile?.role === "admin" && (
        <AdminDashboard session={session} onSignOut={signOut} />
      )}

      {session && !profile && screen !== "auth" && (
        <div className="flex-1 flex flex-col items-center justify-center px-6 text-center">
          <p className="text-sm text-[#8B8F96] mb-2 max-w-xs">
            You're signed in, but your account profile couldn't be loaded.
          </p>
          <p className="text-[11px] text-[#5C5F66] mb-4 max-w-xs break-all">
            Signed in as: {session.user?.email}<br />User ID: {session.user?.id}
          </p>
          <button onClick={signOut} className="text-[13px] text-[#C9CDD3] underline">Sign out and try again</button>
        </div>
      )}
    </div>
  );
}

function AuthScreen({ mode, setMode, onAuthed, onBack, setGlobalError }) {
  const [fullName, setFullName] = useState("");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [needsConfirm, setNeedsConfirm] = useState(false);
  const isLogin = mode === "login";

  const submit = async (e) => {
    e.preventDefault();
    setError("");
    setGlobalError("");
    setLoading(true);
    try {
      if (isLogin) {
        const res = await signIn(email, password);
        await onAuthed({ access_token: res.access_token, refresh_token: res.refresh_token, user: res.user });
      } else {
        const res = await signUp(email, password, fullName);
        if (res.access_token) {
          await onAuthed({ access_token: res.access_token, refresh_token: res.refresh_token, user: res.user });
        } else {
          setNeedsConfirm(true);
        }
      }
    } catch (e2) {
      setError(e2.message);
    } finally {
      setLoading(false);
    }
  };

  if (needsConfirm) {
    return (
      <div className="flex-1 flex flex-col items-center justify-center px-6 text-center">
        <h1 style={{ fontFamily: "Montserrat, sans-serif" }} className="text-xl font-bold mb-2">Check your email</h1>
        <p className="text-sm text-[#8B8F96] max-w-xs mb-6">We sent a confirmation link to {email}. Confirm it, then sign in.</p>
        <button onClick={() => { setNeedsConfirm(false); setMode("login"); }} className="bg-[#E4E7EB] hover:bg-white text-[#0A0A0B] font-semibold text-sm px-6 py-2.5 rounded-lg">
          Go to Sign In
        </button>
      </div>
    );
  }

  return (
    <div className="flex-1 flex flex-col items-center justify-center px-6 py-12">
      <div className="w-full max-w-sm">
        <div className="bg-[#111214] border border-[#232529] rounded-xl p-6">
          <h1 style={{ fontFamily: "Montserrat, sans-serif" }} className="text-xl font-bold mb-1">{isLogin ? "Sign in" : "Create your account"}</h1>
          <p className="text-sm text-[#8B8F96] mb-6">{isLogin ? "Book services and track your detail history." : "Save your vehicle info and see every detail we've done."}</p>
          <form onSubmit={submit} className="space-y-3.5">
            {!isLogin && <Field icon={<User size={15} />} placeholder="Full name" value={fullName} onChange={(e) => setFullName(e.target.value)} required />}
            <Field icon={<User size={15} />} placeholder="Email" type="email" value={email} onChange={(e) => setEmail(e.target.value)} required />
            <Field icon={<User size={15} />} placeholder="Password" type="password" value={password} onChange={(e) => setPassword(e.target.value)} required minLength={6} />
            {error && <p className="text-[13px] text-[#E08A8A]">{error}</p>}
            <button type="submit" disabled={loading} className="w-full mt-2 bg-[#E4E7EB] hover:bg-white text-[#0A0A0B] font-semibold text-sm py-2.5 rounded-lg transition-colors disabled:opacity-60 flex items-center justify-center gap-2">
              {loading && <Loader2 size={14} className="animate-spin" />}
              {isLogin ? "Sign in" : "Create account"}
            </button>
          </form>
          <button onClick={() => setMode(isLogin ? "signup" : "login")} className="w-full text-center text-[13px] text-[#8B8F96] hover:text-[#C9CDD3] mt-5">
            {isLogin ? "New here? Create an account" : "Already have an account? Sign in"}
          </button>
        </div>
        <button onClick={onBack} className="w-full text-center text-[13px] text-[#5C5F66] hover:text-[#8B8F96] mt-4">Back to homepage</button>
      </div>
    </div>
  );
}

function BookingFlow({ session, profile, onConfirm }) {
  const days = getNextDays(6);
  const [services, setServices] = useState(null);
  const [serviceId, setServiceId] = useState(null);
  const [type, setType] = useState("dropoff");
  const [vehicle, setVehicle] = useState("");
  const [mobileAddress, setMobileAddress] = useState("");
  const [dayIndex, setDayIndex] = useState(0);
  const [dayBookings, setDayBookings] = useState([]);
  const [loadingSlots, setLoadingSlots] = useState(false);
  const [submitting, setSubmitting] = useState(false);
  const [error, setError] = useState("");

  const selectedDay = days[dayIndex];
  const dateKey = iso(selectedDay);
  const service = services?.find((s) => s.id === serviceId);

  useEffect(() => {
    fetchServices().then((s) => { setServices(s); setServiceId(s[0]?.id); }).catch((e) => setError(e.message));
  }, []);

  useEffect(() => {
    if (!session) return;
    setLoadingSlots(true);
    fetchAvailability(session.access_token, dateKey)
      .then(setDayBookings)
      .catch((e) => setError(e.message))
      .finally(() => setLoadingSlots(false));
  }, [dateKey, session]);

  const availableStarts = useMemo(() => {
    if (!service) return [];
    return getAvailableStarts(dayBookings, service.duration_min, type, CONFIG.businessHours, CONFIG.bookingGranularityMin, CONFIG.mobileTravelBufferMin);
  }, [dayBookings, service, type]);

  const submitBooking = async (startMinutes) => {
    if (!vehicle.trim()) { setError("Enter your vehicle (e.g. 2021 Ford F-150)."); return; }
    if (type === "mobile" && !mobileAddress.trim()) { setError("Enter the address for mobile service."); return; }
    setSubmitting(true);
    setError("");
    try {
      const v = await createVehicle(session.access_token, profile.id, vehicle.trim());
      const booking = await createBooking(session.access_token, {
        profile_id: profile.id,
        service_id: service.id,
        vehicle_id: v.id,
        booking_date: dateKey,
        start_time: minutesToPgTime(startMinutes),
        duration_min: service.duration_min,
        type,
        mobile_address: type === "mobile" ? mobileAddress.trim() : null,
        status: "pending",
        price_cents: service.price_cents,
      });
      onConfirm({
        dateLabel: dayLabel(selectedDay),
        time: minutesToDisplay(startMinutes),
        service: service.name,
        type,
      });
    } catch (e) {
      setError(e.message);
    } finally {
      setSubmitting(false);
    }
  };

  if (!services) return <LoadingBox center />;

  return (
    <main className="flex-1 px-5 py-6 max-w-md mx-auto w-full">
      <h1 style={{ fontFamily: "Montserrat, sans-serif" }} className="text-lg font-bold mb-4">Book a Service</h1>

      <label className="text-[11px] uppercase tracking-wide text-[#8B8F96] mb-1.5 block">Vehicle</label>
      <input value={vehicle} onChange={(e) => setVehicle(e.target.value)} placeholder="e.g. 2021 Ford F-150"
        className="w-full bg-[#0D0E10] border border-[#232529] rounded-lg px-3.5 py-2.5 text-sm outline-none mb-5" />

      <label className="text-[11px] uppercase tracking-wide text-[#8B8F96] mb-1.5 block">Service</label>
      <select value={serviceId || ""} onChange={(e) => setServiceId(e.target.value)}
        className="w-full bg-[#0D0E10] border border-[#232529] rounded-lg px-3.5 py-2.5 text-sm outline-none mb-5">
        {services.map((s) => <option key={s.id} value={s.id}>{s.name} — ${(s.price_cents / 100).toFixed(0)}</option>)}
      </select>

      <label className="text-[11px] uppercase tracking-wide text-[#8B8F96] mb-1.5 block">Drop-off or Mobile</label>
      <div className="flex gap-2.5 mb-2">
        <button onClick={() => setType("dropoff")} className={`flex-1 flex items-center justify-center gap-1.5 text-sm py-2.5 rounded-lg border transition-colors ${type === "dropoff" ? "border-[#C9CDD3] text-[#F5F5F6]" : "border-[#232529] text-[#8B8F96]"}`}>
          <Building2 size={13} /> Drop-off
        </button>
        <button onClick={() => setType("mobile")} className={`flex-1 flex items-center justify-center gap-1.5 text-sm py-2.5 rounded-lg border transition-colors ${type === "mobile" ? "border-[#C9CDD3] text-[#F5F5F6]" : "border-[#232529] text-[#8B8F96]"}`}>
          <Home size={13} /> Mobile
        </button>
      </div>
      {type === "mobile" && (
        <input value={mobileAddress} onChange={(e) => setMobileAddress(e.target.value)} placeholder="Address for mobile service"
          className="w-full bg-[#0D0E10] border border-[#232529] rounded-lg px-3.5 py-2.5 text-sm outline-none mb-5 mt-2" />
      )}
      {type !== "mobile" && <div className="mb-3" />}

      <label className="text-[11px] uppercase tracking-wide text-[#8B8F96] mb-1.5 block">Date</label>
      <div className="flex items-center gap-2 mb-5">
        <button onClick={() => setDayIndex((i) => Math.max(0, i - 1))} disabled={dayIndex === 0} className="p-1.5 border border-[#232529] rounded-md text-[#8B8F96] disabled:opacity-30"><ChevronLeft size={14} /></button>
        <div className="flex-1 text-center bg-[#111214] border border-[#232529] rounded-lg py-2.5 text-sm font-medium">{dayLabel(selectedDay)}</div>
        <button onClick={() => setDayIndex((i) => Math.min(days.length - 1, i + 1))} disabled={dayIndex === days.length - 1} className="p-1.5 border border-[#232529] rounded-md text-[#8B8F96] disabled:opacity-30"><ChevronRight size={14} /></button>
      </div>

      <label className="text-[11px] uppercase tracking-wide text-[#8B8F96] mb-1.5 block">Available Start Times</label>
      {error && <ErrorBox message={error} />}
      {loadingSlots ? (
        <LoadingBox />
      ) : availableStarts.length === 0 ? (
        <div className="text-center py-8 text-[13px] text-[#5C5F66] border border-dashed border-[#232529] rounded-lg mb-2">No slots long enough for this service on this day.</div>
      ) : (
        <div className="grid grid-cols-3 gap-2.5 mb-2">
          {availableStarts.map((mins) => (
            <button key={mins} disabled={submitting} onClick={() => submitBooking(mins)}
              className="flex items-center justify-center gap-1.5 text-sm py-2.5 rounded-lg border border-[#232529] hover:border-[#4A4D53] transition-colors disabled:opacity-50">
              <Clock size={12} /> {minutesToDisplay(mins)}
            </button>
          ))}
        </div>
      )}
    </main>
  );
}

function Confirmed({ booking, onDone }) {
  return (
    <div className="flex-1 flex flex-col items-center justify-center px-6 text-center">
      <div className="w-14 h-14 rounded-full bg-[#173D22] flex items-center justify-center mb-4"><Check size={22} className="text-[#5FCB7C]" /></div>
      <h1 style={{ fontFamily: "Montserrat, sans-serif" }} className="text-lg font-bold mb-1">Request sent</h1>
      <p className="text-sm text-[#8B8F96] mb-6 max-w-xs">
        {booking.service} ({booking.type === "mobile" ? "mobile" : "drop-off"}) on {booking.dateLabel} at {booking.time}. Saved to your account — you'll get a confirmation once it's approved.
      </p>
      <button onClick={onDone} className="bg-[#E4E7EB] hover:bg-white text-[#0A0A0B] font-semibold text-sm px-6 py-2.5 rounded-lg">Done</button>
    </div>
  );
}

function AdminDashboard({ session, onSignOut }) {
  const [tab, setTab] = useState("requests");
  const [bookings, setBookings] = useState(null);
  const [error, setError] = useState("");
  const [busyId, setBusyId] = useState(null);

  const load = () => {
    fetchAllBookings(session.access_token).then(setBookings).catch((e) => setError(e.message));
  };
  useEffect(load, []);

  const act = async (id, status) => {
    setBusyId(id);
    try {
      await updateBookingStatus(session.access_token, id, status);
      load();
    } catch (e) {
      setError(e.message);
    } finally {
      setBusyId(null);
    }
  };

  const pending = bookings?.filter((b) => b.status === "pending") || [];
  const days = getNextDays(6);
  const dayStart = parse12h(CONFIG.businessHours.start);
  const dayEnd = parse12h(CONFIG.businessHours.end);
  const totalMin = dayEnd - dayStart;

  const revenue = (bookings || []).filter((b) => b.status === "completed").reduce((sum, b) => sum + b.price_cents, 0) / 100;
  const jobsCompleted = (bookings || []).filter((b) => b.status === "completed").length;
  const jobsBooked = (bookings || []).filter((b) => b.status === "approved").length;

  return (
    <div className="flex-1 flex flex-col">
      <header className="flex items-center justify-between px-5 py-4 border-b border-[#1D1E21]">
        <div style={{ fontFamily: "Montserrat, sans-serif" }} className="text-[14px] font-bold uppercase tracking-wide">{CONFIG.businessName} · Owner</div>
        <button onClick={onSignOut} className="flex items-center gap-1.5 text-[12px] text-[#8B8F96] hover:text-[#F5F5F6]"><LogOut size={13} /> Sign out</button>
      </header>
      <main className="flex-1 px-5 py-6 max-w-md mx-auto w-full">
        {error && <ErrorBox message={error} />}
        {!bookings ? <LoadingBox center /> : (
          <>
            <div className="flex gap-1 bg-[#111214] border border-[#232529] rounded-lg p-1 mb-5">
              <TabButton active={tab === "requests"} onClick={() => setTab("requests")} icon={<Clock size={13} />} label={`Requests${pending.length ? ` (${pending.length})` : ""}`} />
              <TabButton active={tab === "schedule"} onClick={() => setTab("schedule")} icon={<CalendarDays size={13} />} label="Schedule" />
              <TabButton active={tab === "stats"} onClick={() => setTab("stats")} icon={<DollarSign size={13} />} label="Stats" />
            </div>
            <div className="flex gap-1 bg-[#111214] border border-[#232529] rounded-lg p-1 mb-5">
              <TabButton active={tab === "expenses"} onClick={() => setTab("expenses")} icon={<Receipt size={13} />} label="Expenses" />
            </div>

            {tab === "requests" && (
              <div className="space-y-2.5">
                {pending.length === 0 && <div className="text-center py-10 text-[13px] text-[#5C5F66] border border-dashed border-[#232529] rounded-lg">No pending requests.</div>}
                {pending.map((req) => (
                  <div key={req.id} className="bg-[#111214] border border-[#232529] rounded-lg p-3.5">
                    <div className="flex items-start justify-between mb-1.5">
                      <div>
                        <div className="text-sm font-semibold">{req.profiles?.full_name || "Customer"}</div>
                        <div className="text-[12px] text-[#C9CDD3] mt-0.5">{req.services?.name}</div>
                      </div>
                      <span style={{ fontFamily: "Montserrat, sans-serif" }} className="text-[9px] font-bold uppercase tracking-wide bg-[#3D3315] text-[#D4AF37] px-2 py-1 rounded">Pending</span>
                    </div>
                    <div className="text-[12px] text-[#8B8F96] flex items-center gap-1.5 mb-3">
                      {req.type === "mobile" ? <Home size={11} /> : <Building2 size={11} />}
                      {dayLabel(new Date(req.booking_date + "T00:00:00"))} · {minutesToDisplay(pgTimeToMinutes(req.start_time))} · {req.duration_min} min
                    </div>
                    <div className="flex gap-2">
                      <button disabled={busyId === req.id} onClick={() => act(req.id, "approved")} className="flex-1 flex items-center justify-center gap-1.5 bg-[#E4E7EB] hover:bg-white text-[#0A0A0B] text-[12px] font-semibold py-2 rounded-md disabled:opacity-50"><Check size={12} /> Approve</button>
                      <button disabled={busyId === req.id} onClick={() => act(req.id, "declined")} className="flex-1 text-[12px] font-medium text-[#8B8F96] hover:text-[#E08A8A] border border-[#232529] py-2 rounded-md disabled:opacity-50">Decline</button>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {tab === "schedule" && (
              <div className="space-y-4">
                {days.map((d) => {
                  const key = iso(d);
                  const dayBookings = bookings.filter((b) => b.booking_date === key && b.status !== "declined" && b.status !== "cancelled");
                  return (
                    <div key={key} className="bg-[#111214] border border-[#232529] rounded-lg p-3.5">
                      <div className="text-sm font-semibold mb-2.5">{dayLabel(d)}</div>
                      <div className="relative h-6 bg-[#0D0E10] rounded overflow-hidden mb-2">
                        {dayBookings.map((b) => {
                          const start = pgTimeToMinutes(b.start_time);
                          const left = ((start - dayStart) / totalMin) * 100;
                          const width = (b.duration_min / totalMin) * 100;
                          return <div key={b.id} title={b.services?.name} className={`absolute top-0 h-full bg-[#D4AF37]/80 ${b.status === "pending" ? "border border-dashed border-[#F5F5F6]" : ""}`} style={{ left: `${left}%`, width: `${width}%` }} />;
                        })}
                      </div>
                      {dayBookings.length === 0 ? <div className="text-[11px] text-[#5C5F66]">No bookings</div> : (
                        <div className="space-y-1">
                          {dayBookings.map((b) => (
                            <div key={b.id} className="text-[11px] text-[#8B8F96] flex justify-between">
                              <span className="flex items-center gap-1.5">{b.type === "mobile" ? <Home size={10} /> : <Building2 size={10} />}{b.services?.name}{b.status === "pending" && <span className="text-[#D4AF37]"> · pending</span>}</span>
                              <span>{minutesToDisplay(pgTimeToMinutes(b.start_time))}</span>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}

            {tab === "stats" && (
              <div className="grid grid-cols-3 gap-2.5">
                <StatCard icon={<DollarSign size={14} />} label="Revenue" value={`$${revenue.toFixed(0)}`} accent />
                <StatCard icon={<CheckCircle2 size={14} />} label="Completed" value={jobsCompleted} />
                <StatCard icon={<CalendarDays size={14} />} label="Upcoming" value={jobsBooked} />
              </div>
            )}

            {tab === "expenses" && <ExpensesView session={session} />}
          </>
        )}
      </main>
    </div>
  );
}

function ExpensesView({ session }) {
  const [expenses, setExpenses] = useState(null);
  const [error, setError] = useState("");
  const [showForm, setShowForm] = useState(false);
  const [submitting, setSubmitting] = useState(false);
  const [form, setForm] = useState({ expense_date: iso(new Date()), category: CONFIG.expenseCategories[0], amount: "", note: "" });
  const [monthOffset, setMonthOffset] = useState(0);

  const load = () => fetchExpenses(session.access_token).then(setExpenses).catch((e) => setError(e.message));
  useEffect(load, []);

  const now = new Date();
  const viewMonth = new Date(now.getFullYear(), now.getMonth() + monthOffset, 1);
  const monthLabel = viewMonth.toLocaleDateString("en-US", { month: "long", year: "numeric" });
  const monthKey = `${viewMonth.getFullYear()}-${String(viewMonth.getMonth() + 1).padStart(2, "0")}`;

  const monthExpenses = (expenses || []).filter((e) => e.expense_date.startsWith(monthKey));
  const monthTotal = monthExpenses.reduce((sum, e) => sum + e.amount_cents, 0) / 100;
  const byCategory = CONFIG.expenseCategories.map((cat) => ({
    cat,
    total: monthExpenses.filter((e) => e.category === cat).reduce((sum, e) => sum + e.amount_cents, 0) / 100,
  })).filter((c) => c.total > 0);

  const submit = async (e) => {
    e.preventDefault();
    if (!form.amount || isNaN(parseFloat(form.amount))) { setError("Enter a valid amount."); return; }
    setSubmitting(true);
    setError("");
    try {
      await createExpense(session.access_token, {
        expense_date: form.expense_date,
        category: form.category,
        amount_cents: Math.round(parseFloat(form.amount) * 100),
        note: form.note || null,
        created_by: session.user.id,
      });
      setForm({ expense_date: iso(new Date()), category: CONFIG.expenseCategories[0], amount: "", note: "" });
      setShowForm(false);
      load();
    } catch (e2) {
      setError(e2.message);
    } finally {
      setSubmitting(false);
    }
  };

  const remove = async (id) => {
    try {
      await deleteExpense(session.access_token, id);
      load();
    } catch (e) {
      setError(e.message);
    }
  };

  return (
    <div>
      {error && <ErrorBox message={error} />}

      <div className="flex items-center gap-2 mb-5">
        <button onClick={() => setMonthOffset((m) => m - 1)} className="p-1.5 border border-[#232529] rounded-md text-[#8B8F96]"><ChevronLeft size={14} /></button>
        <div className="flex-1 text-center bg-[#111214] border border-[#232529] rounded-lg py-2.5 text-sm font-medium">{monthLabel}</div>
        <button onClick={() => setMonthOffset((m) => Math.min(0, m + 1))} disabled={monthOffset === 0} className="p-1.5 border border-[#232529] rounded-md text-[#8B8F96] disabled:opacity-30"><ChevronRight size={14} /></button>
      </div>

      <div className="bg-[#111214] border border-[#232529] rounded-lg p-4 mb-5 text-center">
        <div className="text-[11px] text-[#8B8F96] uppercase tracking-wide mb-1">Total Spent</div>
        <div className="text-2xl font-bold">${monthTotal.toFixed(2)}</div>
      </div>

      {byCategory.length > 0 && (
        <div className="space-y-2 mb-5">
          {byCategory.map((c) => (
            <div key={c.cat} className="flex items-center justify-between text-[12px]">
              <span className="text-[#8B8F96]">{c.cat}</span>
              <span className="text-[#C9CDD3] font-medium">${c.total.toFixed(2)}</span>
            </div>
          ))}
        </div>
      )}

      {!showForm ? (
        <button onClick={() => setShowForm(true)} className="w-full bg-[#E4E7EB] hover:bg-white text-[#0A0A0B] font-semibold text-sm py-2.5 rounded-lg mb-5">
          + Add Expense
        </button>
      ) : (
        <form onSubmit={submit} className="bg-[#111214] border border-[#232529] rounded-lg p-4 space-y-3 mb-5">
          <input type="date" value={form.expense_date} onChange={(e) => setForm((f) => ({ ...f, expense_date: e.target.value }))}
            className="w-full bg-[#0D0E10] border border-[#232529] rounded-lg px-3.5 py-2.5 text-sm outline-none" />
          <select value={form.category} onChange={(e) => setForm((f) => ({ ...f, category: e.target.value }))}
            className="w-full bg-[#0D0E10] border border-[#232529] rounded-lg px-3.5 py-2.5 text-sm outline-none">
            {CONFIG.expenseCategories.map((c) => <option key={c} value={c}>{c}</option>)}
          </select>
          <input type="number" step="0.01" placeholder="Amount ($)" value={form.amount} onChange={(e) => setForm((f) => ({ ...f, amount: e.target.value }))}
            className="w-full bg-[#0D0E10] border border-[#232529] rounded-lg px-3.5 py-2.5 text-sm outline-none" />
          <input placeholder="Note (optional)" value={form.note} onChange={(e) => setForm((f) => ({ ...f, note: e.target.value }))}
            className="w-full bg-[#0D0E10] border border-[#232529] rounded-lg px-3.5 py-2.5 text-sm outline-none" />
          <div className="flex gap-2">
            <button type="submit" disabled={submitting} className="flex-1 bg-[#E4E7EB] hover:bg-white text-[#0A0A0B] font-semibold text-sm py-2.5 rounded-lg disabled:opacity-60">
              {submitting ? "Saving…" : "Save"}
            </button>
            <button type="button" onClick={() => setShowForm(false)} className="flex-1 border border-[#232529] text-[#8B8F96] text-sm py-2.5 rounded-lg">Cancel</button>
          </div>
        </form>
      )}

      <h2 style={{ fontFamily: "Montserrat, sans-serif" }} className="text-[12px] font-bold uppercase tracking-wide text-[#8B8F96] mb-3">This Month's Expenses</h2>
      {!expenses ? <LoadingBox /> : monthExpenses.length === 0 ? (
        <div className="text-center py-8 text-[13px] text-[#5C5F66] border border-dashed border-[#232529] rounded-lg">No expenses logged for {monthLabel}.</div>
      ) : (
        <div className="space-y-2">
          {monthExpenses.map((e) => (
            <div key={e.id} className="bg-[#111214] border border-[#232529] rounded-lg p-3 flex items-center justify-between">
              <div>
                <div className="text-sm font-medium">{e.category}</div>
                <div className="text-[11px] text-[#5C5F66]">{e.expense_date}{e.note ? ` · ${e.note}` : ""}</div>
              </div>
              <div className="flex items-center gap-3">
                <span className="text-sm font-semibold text-[#C9CDD3]">${(e.amount_cents / 100).toFixed(2)}</span>
                <button onClick={() => remove(e.id)} className="text-[#5C5F66] hover:text-[#E08A8A]"><Trash2 size={13} /></button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function TabButton({ active, onClick, icon, label }) {
  return (
    <button onClick={onClick} className={`flex-1 flex items-center justify-center gap-1.5 text-[12px] font-medium py-2 rounded-md transition-colors ${active ? "bg-[#1D1E21] text-[#F5F5F6]" : "text-[#8B8F96] hover:text-[#C9CDD3]"}`}>
      {icon} {label}
    </button>
  );
}
function StatCard({ icon, label, value, accent }) {
  return (
    <div className="bg-[#111214] border border-[#232529] rounded-lg p-3">
      <div className={accent ? "text-[#D4AF37] mb-1.5" : "text-[#5C5F66] mb-1.5"}>{icon}</div>
      <div className="text-base font-bold leading-none mb-1">{value}</div>
      <div className="text-[10px] text-[#8B8F96] uppercase tracking-wide">{label}</div>
    </div>
  );
}
function LoadingBox({ center }) {
  return <div className={`flex items-center gap-2 text-[13px] text-[#8B8F96] py-6 ${center ? "justify-center flex-1" : ""}`}><Loader2 size={14} className="animate-spin" /> Loading…</div>;
}
function ErrorBox({ message }) {
  return <div className="flex items-start gap-2 bg-[#3D1515] border border-[#5C2323] rounded-lg px-3.5 py-2.5 text-[12px] text-[#E08A8A] mb-3"><AlertCircle size={14} className="shrink-0 mt-0.5" /> {message}</div>;
}


const root = createRoot(document.getElementById("root"));
root.render(<LiveBookingApp />);

</script>
</body>
</html>
